services:
  snowgo-nginx:
    image: nginx:1.26
    container_name: snowgo-nginx
    ports:
      - ${NGINX_PORT:-80}:8080
    restart: always
    logging:
      options:
        max-size: '50m'
        max-file: '10'
    volumes:
      - /etc/localtime:/etc/localtime
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/nginx/conf.d:/etc/nginx/conf.d
      - ../data/nginx/log:/var/log/nginx/
      - ../dist:/usr/share/nginx/html/dist
    depends_on:
      snowgo-service:
        condition: service_started
      snowgo-service2:
        condition: service_started
    networks:
      - snowgo_network

  snowgo-mysql:
    image: mysql:8.0
    container_name: snowgo-mysql
    ports:
      - ${MYSQL_PORT:-3307}:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zx.123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-snowgo}
    volumes:
      - /etc/localtime:/etc/localtime
      - ../data/mysql/data:/var/lib/mysql
      - ../data/mysql/logs:/var/log/mysql
      - ./config/mysql/my.cnf:/etc/mysql/my.cnf
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/init.sql  # 映射初始化SQL
    restart: always
    networks:
      - snowgo_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-zx.123}" ]
      interval: 10s
      timeout: 3s
      retries: 5

  snowgo-redis:
    image: redis:7.2
    container_name: snowgo-redis
    restart: always
    ports:
      - ${REDIS_PORT:-6380}:6379
    sysctls:
      net.core.somaxconn: 1024
    volumes:
      - /etc/localtime:/etc/localtime
      - ../data/redis/data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command:
      redis-server /usr/local/etc/redis/redis.conf
    networks:
      - snowgo_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  snowgo-service:
    image: ${SERVICE_IMAGE_NAME:-snowgo}:${SERVICE_IMAGE_VERSION:-1.0.0}
    #build:
    #  context: .
    #  dockerfile: Dockerfile
    container_name: snowgo-service
    restart: always
    logging:
      options:
        max-size: '50m'
        max-file: '10'
    environment:
      ENV: ${ENV:-container}
      SNOWFLAKE_NODE: 1
    volumes:
      - /etc/localtime:/etc/localtime
      - ./config:/app/config:ro
      - ./logs/app1:/app/logs
    networks:
      - snowgo_network
    depends_on:
      snowgo-mysql:
        condition: service_healthy  # 确保MySQL就绪后再启动
      snowgo-redis:
        condition: service_healthy  # 确保Redis就绪后再启动
    security_opt:
      - no-new-privileges:true

  snowgo-service2:
    image: ${SERVICE_IMAGE_NAME:-snowgo}:${SERVICE_IMAGE_VERSION:-1.0.0}
    #build:
    #  context: .
    #  dockerfile: Dockerfile
    container_name: snowgo-service2
    restart: always
    logging:
      options:
        max-size: '50m'
        max-file: '10'
    environment:
      ENV: ${ENV:-container}
      SNOWFLAKE_NODE: 2
    volumes:
      - /etc/localtime:/etc/localtime
      - ./config:/app/config:ro
      - ./logs/app2:/app/logs
    networks:
      - snowgo_network
    depends_on:
      snowgo-mysql:
        condition: service_healthy
      snowgo-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

networks:
  snowgo_network:
    name: snowgo_network
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.101.0.0/24}
