name: Docker Build , Push and Deploy

run-name: Deploy ${{ github.ref_type }} ${{ github.ref_name }}
on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: rhht-snow
  PROJECT_NAME: snowgo
  USERNAME: 1597691116@qq.com

jobs:
  build_and_push:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      IMAGE_TAG: ${{ steps.set_tag.outputs.IMAGE_TAG }}
      ENVIRONMENT: ${{ steps.set_tag.outputs.ENVIRONMENT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build tag and environment
        id: set_tag
        run: |
          REF="${{ github.ref_name }}"
          REF_TYPE="${{ github.ref_type }}"
          echo "Selected ref: $REF ($REF_TYPE)"

          if [[ "$REF_TYPE" == "branch" && "$REF" == "dev" ]]; then
            IMAGE_TAG="dev-latest"
            ENVIRONMENT="dev"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            IMAGE_TAG="$REF"
            if [[ "$REF" == *-rc.* ]]; then
              ENVIRONMENT="uat"
            elif [[ "$REF" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              ENVIRONMENT="prod"
            else
              echo "标签格式不正确: $REF"
              exit 1
            fi
          else
            echo "不支持的构建类型: $REF_TYPE/$REF"
            exit 1
          fi
          
          # prod才打latest
          # COMMIT_SHA=${GITHUB_SHA::8}   # 取前 8 位 commit SHA
          # TAGS="${IMAGE_TAG},${COMMIT_SHA}"
          TAGS="${IMAGE_TAG}"
          if [[ "$ENVIRONMENT" == "prod" ]]; then
            TAGS="${TAGS},latest"
          fi
          echo "TAGS=$TAGS" >> $GITHUB_ENV

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV

          # 设置 job 输出
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.PROJECT_NAME }}
          tags: ${{ env.TAGS }}
          labels: |
            environment=${{ env.ENVIRONMENT }}
            image_version=${{ env.IMAGE_TAG }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENVIRONMENT=${{ env.ENVIRONMENT }}

      - name: Print info
        run: |
          echo "✅ 构建完成!"
          echo "📦 镜像: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.PROJECT_NAME }}"
          echo "🏷️ 标签: ${{ env.IMAGE_TAG }}"
          echo "🌍 环境: ${{ env.ENVIRONMENT }}"
          echo "🔗 拉取命令: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.PROJECT_NAME }}:${{ env.IMAGE_TAG }}"
          
          # 生成部署摘要
          echo "::notice title=镜像构建完成::环境: ${{ env.ENVIRONMENT }} | 标签: ${{ env.IMAGE_TAG }} | 时间: $(date)"

  deploy:
    runs-on: ubuntu-22.04
    needs: build_and_push
    timeout-minutes: 10
    steps:
      - name: Set up SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SNOWGO_SERVER_IP }}
          username: ${{ secrets.SNOWGO_SERVER_USER }}
          key: ${{ secrets.SNOWGO_SERVER_SSH_KEY }}
          script: |
            # todo 根据环境选择不同的服务器或其他操作
            cd /opt/snowgo
  
            # 组合完整镜像地址
            IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.PROJECT_NAME }}" 
            # 如果 .env 不存在则创建
            if [ ! -f .env ]; then
              echo "ENV=${{ needs.build_and_push.outputs.ENVIRONMENT }}" > .env
              echo "SERVICE_IMAGE_NAME=$IMAGE_NAME" >> .env
              echo "SERVICE_IMAGE_VERSION=${{ needs.build_and_push.outputs.IMAGE_TAG }}" >> .env
            else
              # 替换已有的 SERVICE_IMAGE_NAME 和 SERVICE_IMAGE_VERSION
              sed -i "s|^SERVICE_IMAGE_NAME=.*|SERVICE_IMAGE_NAME=$IMAGE_NAME|" .env
              sed -i "s|^SERVICE_IMAGE_VERSION=.*|SERVICE_IMAGE_VERSION=${{ needs.build_and_push.outputs.IMAGE_TAG }}|" .env
            fi
  
            # 拉取最新镜像
            docker compose pull snowgo-service
  
            # 启动服务，自动替换镜像
            docker compose up -d --remove-orphans
  
            # 查看服务状态
            docker compose ps
